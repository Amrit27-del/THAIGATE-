<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Gate | Khor Fakkan</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; }
        body { margin: 0; font-family: 'Georgia', serif; background-color: var(--dark); color: white; }

        header { padding: 20px 5%; display: flex; justify-content: space-between; background: #000; border-bottom: 1px solid var(--gold); }
        .logo { font-size: 24px; letter-spacing: 4px; color: var(--gold); font-weight: bold; text-decoration: none; }

        .hero { 
            height: 60vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('1000014507.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        /* Functional Booking Section */
        .booking-widget {
            background: white; width: 90%; max-width: 900px; margin: -60px auto 0;
            display: flex; flex-wrap: wrap; box-shadow: 0 15px 35px rgba(0,0,0,0.6); color: #333;
            border-radius: 4px; overflow: hidden;
        }
        .widget-item { flex: 1; padding: 20px; border-right: 1px solid #eee; min-width: 140px; }
        .widget-item label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .widget-item input, .widget-item select { border: none; width: 100%; font-size: 14px; outline: none; background: transparent; }
        
        .book-btn { 
            background: #000; color: var(--gold); border: none; 
            padding: 0 50px; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 2px;
        }

        .action-links { text-align: center; margin: 80px 0; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        .btn-gold {
            display: inline-block; padding: 18px 40px; border: 1px solid var(--gold); 
            color: var(--gold); text-decoration: none; text-transform: uppercase; 
            letter-spacing: 3px; transition: 0.3s; cursor: pointer; font-size: 13px;
        }
        .btn-gold:hover { background: var(--gold); color: black; }

        footer { background: #050505; padding: 60px 5%; text-align: center; border-top: 1px solid var(--gold); line-height: 2; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">THAI GATE</a>
    <div style="letter-spacing: 2px; font-size: 12px; color: var(--gold);">KHOR FAKKAN</div>
</header>

<section class="hero">
    <h1 style="font-size: 55px; letter-spacing: 12px; margin: 0; text-transform: uppercase;">Khor Fakkan</h1>
    <p style="letter-spacing: 4px; color: var(--gold);">PREMIUM DINING EXPERIENCE</p>
</section>

<div class="booking-widget">
    <div class="widget-item">
        <label>Date</label>
        <input type="date" id="resDate">
    </div>
    <div class="widget-item">
        <label>Time</label>
        <input type="time" id="resTime">
    </div>
    <div class="widget-item">
        <label>Guests</label>
        <select id="resGuests">
            <option value="2 Guests">2 Guests</option>
            <option value="4 Guests">4 Guests</option>
            <option value="6 Guests">6 Guests</option>
            <option value="More than 6">6+ Guests</option>
        </select>
    </div>
    <button class="book-btn" onclick="handleBooking()">Book Table</button>
</div>

<div class="action-links">
    <a href="https://www.google.com/maps/search/?api=1&query=Thai+Gate+Restaurant+Khor+Fakkan" target="_blank" class="btn-gold">Find Location</a>
    <div class="btn-gold" onclick="alert('Menu details will appear here')">Full Menu</div>
</div>

<footer>
    <p style="color: var(--gold); letter-spacing: 2px;">THAI GATE KHOR FAKKAN</p>
    <p>Beach Front, Corniche Street, Sharjah</p>
    <p>Reservation: +971 58 239 0102</p>
</footer>

<script>
    function handleBooking() {
        const date = document.getElementById('resDate').value;
        const time = document.getElementById('resTime').value;
        const guests = document.getElementById('resGuests').value;

        if (!date || !time) {
            alert("Please select both a date and a time.");
            return;
        }

        const phone = "971582390102";
        const message = `Booking Request for Thai Gate Khor Fakkan:\nDate: ${date}\nTime: ${time}\nGuests: ${guests}`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>

</body>
      </html>
