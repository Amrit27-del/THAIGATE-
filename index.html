<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Premium Thai Restaurant Experience</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f0f0f;color:#fff;overflow-x:hidden;}
.hidden{opacity:0;transform:translateY(60px);transition:all 1s ease;}
.show{opacity:1;transform:translateY(0);}

/* HERO VIDEO */
.hero{
    height:100vh;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}
.hero video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    top:0;left:0;
    z-index:-1;
}
.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}
.hero-content{position:relative;z-index:2;}
.hero h1{font-family:'Playfair Display';font-size:4rem;color:#ffcc70;}
.hero p{margin-top:10px;color:#ddd}
.btn{margin-top:20px;padding:12px 28px;border:none;border-radius:30px;background:linear-gradient(45deg,#ff9800,#ffcc70);cursor:pointer;font-weight:bold;}

section{padding:80px 10%;}
.section-title{text-align:center;font-size:2.5rem;color:#ffcc70;margin-bottom:40px;font-family:'Playfair Display'}

.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#1a1a1a;border-radius:15px;overflow:hidden;transition:0.4s;}
.card:hover{transform:translateY(-10px);}
.card img{width:100%;height:180px;object-fit:cover;}
.card-content{padding:15px}
.card h3{color:#ffcc70}
.card p{color:#ccc;font-size:0.9rem}

.location-box{background:#1a1a1a;padding:30px;border-radius:15px;text-align:center;animation:pulse 3s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,204,112,0.4)}70%{box-shadow:0 0 0 20px rgba(255,204,112,0)}100%{box-shadow:0 0 0 0 rgba(255,204,112,0)}}

/* ORDER SYSTEM */
.order-box{background:#1a1a1a;padding:20px;border-radius:15px;max-width:500px;margin:auto}
.order-item{display:flex;justify-content:space-between;margin:10px 0}
.order-btn{background:#ffcc70;border:none;padding:5px 10px;border-radius:5px;cursor:pointer}

/* PAYMENT MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.modal-content{
    background:#1a1a1a;
    padding:30px;
    border-radius:10px;
    width:300px;
}

/* CHATBOT */
.chatbot{
    position:fixed;
    bottom:20px;
    right:20px;
    width:300px;
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
}
.chat-header{background:#ffcc70;color:#000;padding:10px;font-weight:bold}
.chat-body{height:200px;overflow-y:auto;padding:10px;font-size:0.9rem}
.chat-input{display:flex}
.chat-input input{flex:1;padding:8px;border:none}
.chat-input button{background:#ffcc70;border:none;padding:8px}

footer{text-align:center;padding:30px;background:#111;color:#aaa}
</style></head>
<body><!-- HERO VIDEO --><div class="hero hidden">
    <video autoplay muted loop>
        <source src="https://cdn.coverr.co/videos/coverr-thai-street-food-restaurant-restaurant-5244/1080p.mp4" type="video/mp4">
    </video>
    <div class="hero-content">
        <h1>Thai Luxury Experience</h1>
        <p>Premium Thai • Seafood • Japanese Fusion</p>
        <button class="btn">Explore Menu</button>
    </div>
</div><!-- MENU --><section class="hidden">
<h2 class="section-title">Order Online</h2>
<div class="order-box">
    <div class="order-item">Tom Yum Soup <button class="order-btn" onclick="addToCart('Tom Yum Soup',15)">Add</button></div>
    <div class="order-item">Pad Thai <button class="order-btn" onclick="addToCart('Pad Thai',18)">Add</button></div>
    <div class="order-item">Grilled Lobster <button class="order-btn" onclick="addToCart('Lobster',35)">Add</button></div>
    <button class="btn" onclick="openPayment()">Checkout</button>
</div>
</section><!-- LOCATION --><section class="hidden">
<h2 class="section-title">Khorfakkan Location</h2>
<div class="location-box">🌊 Beachfront Thai Dining Experience</div>
</section><!-- PAYMENT MODAL --><div class="modal" id="paymentModal">
<div class="modal-content">
<h3 style="color:#ffcc70">Payment</h3>
<p id="totalPrice">Total: $0</p>
<input placeholder="Card Number" style="width:100%;margin:5px 0;padding:8px">
<button class="btn" onclick="payNow()">Pay Now</button>
</div>
</div><!-- CHATBOT --><div class="chatbot">
<div class="chat-header">Thai AI Assistant</div>
<div class="chat-body" id="chat"></div>
<div class="chat-input">
<input id="msg" placeholder="Ask about menu...">
<button onclick="sendMsg()">Send</button>
</div>
</div><script>
let cart=[];

function addToCart(item,price){
    cart.push({item,price});
    alert(item+" added to cart");
}

function openPayment(){
    let total=cart.reduce((a,b)=>a+b.price,0);
    document.getElementById('totalPrice').innerText="Total: $"+total;
    document.getElementById('paymentModal').style.display='flex';
}

function payNow(){
    alert("Payment Successful (Demo)");
    cart=[];
    document.getElementById('paymentModal').style.display='none';
}

// CHATBOT SIMPLE AI
function sendMsg(){
    let input=document.getElementById('msg');
    let chat=document.getElementById('chat');
    let text=input.value;
    chat.innerHTML += "<div>You: "+text+"</div>";

    let reply="Try our Tom Yum or Pad Thai 🍜";
    if(text.toLowerCase().includes("lobster")) reply="Our lobster is chef special 🔥";

    setTimeout(()=>{
        chat.innerHTML += "<div>AI: "+reply+"</div>";
    },500);

    input.value="";
}

// SCROLL ANIMATION
const observer=new IntersectionObserver(e=>{
    e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('show')})
});
document.querySelectorAll('.hidden').forEach(el=>observer.observe(el));
</script></body>
  </html>
