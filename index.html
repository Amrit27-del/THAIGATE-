<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thaigate Khorfakkan | Premium Thai Dining</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f0f0f;
            --light: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p {
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .location {
            color: var(--gold);
            margin-top: 20px;
            font-weight: 600;
        }
        .btn {
            margin-top: 30px;
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.4s;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .btn:hover {
            background: var(--gold);
            color: var(--dark);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Thaigate</h1>
        <p>A GATEWAY TO AUTHENTIC THAI FLAVORS</p>
        
        <div class="location">KHOR FAKKAN • SHARJAH</div>
        
        <p style="margin-top: 30px;">Experience the art of premium Thai cuisine in the heart of Khor Fakkan.</p>
        
        <a href="https://wa.me/YOURNUMBER" class="btn">Book a Table</a>
        
        <div class="footer">
            © 2026 Thaigate Khorfakkan. All Rights Reserved.
        </div>
    </div>

</body>
  </html>
